<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Beat Saber VR - Dreamcore & Fixed Sparks</title>
    <script src="https://aframe.io/releases/1.4.2/aframe.min.js"></script>
    <script src="https://unpkg.com/aframe-environment-component@1.3.2/dist/aframe-environment-component.min.js"></script>
</head>
<body>

    <a-scene xr-mode-ui="enabled: true">
        
        <a-assets>
            <audio id="music-easy" src="https://www.soundhelix.com/examples/mp3/SoundHelix-Song-1.mp3" preload="auto"></audio>
            <audio id="music-normal" src="https://www.soundhelix.com/examples/mp3/SoundHelix-Song-3.mp3" preload="auto"></audio>
            <audio id="music-hard" src="https://www.soundhelix.com/examples/mp3/SoundHelix-Song-5.mp3" preload="auto"></audio>
            <audio id="music-backrooms" src="https://www.soundhelix.com/examples/mp3/SoundHelix-Song-6.mp3" preload="auto"></audio>
            <audio id="music-shiver" src="https://www.soundhelix.com/examples/mp3/SoundHelix-Song-8.mp3" preload="auto"></audio>
        </a-assets>

        <a-entity id="ambient-env" environment="preset: poison; lighting: none; ground: spikes; grid: cross"></a-entity>
        <a-entity light="type: ambient; color: #111; intensity: 1"></a-entity>
        <a-entity id="neon-glow" light="type: directional; color: #ff0055; intensity: 1.5" position="0 8 -5"></a-entity>

        <a-entity id="decorations" position="0 0 0">
            <a-torus class="moving-ring" color="#ff0055" radius="5" tube="0.08" position="0 2.5 -10" material="emissive: #ff0055; emissiveIntensity: 4"></a-torus>
            <a-torus class="moving-ring" color="#00ffff" radius="5" tube="0.08" position="0 2.5 -20" material="emissive: #00ffff; emissiveIntensity: 4"></a-torus>
            
            <a-box position="-6 5 -15" scale="0.8 12 0.8" color="#00ffff" material="emissive: #00ffff; emissiveIntensity: 3"></a-box>
            <a-box position="6 5 -15" scale="0.8 12 0.8" color="#ff0055" material="emissive: #ff0055; emissiveIntensity: 3"></a-box>
        </a-entity>

        <a-entity id="dreamcore-decor" visible="false">
            <a-sphere position="0 6 -25" radius="2" color="#fff" material="roughness: 0.1">
                <a-sphere position="0 0 1.8" radius="0.6" color="#000"></a-sphere> </a-sphere>
            <a-box position="-3 5 -20" scale="3 0.1 1" color="#ff00ff" rotation="0 0 30" material="emissive: #ff00ff"></a-box>
            <a-box position="3 5 -20" scale="3 0.1 1" color="#ff00ff" rotation="0 0 -30" material="emissive: #ff00ff"></a-box>
            <a-sphere position="-4 2 -12" radius="0.4" color="#fff"><a-sphere position="0 0 0.35" radius="0.12" color="#ff0000"></a-sphere></a-sphere>
            <a-sphere position="4 3 -16" radius="0.4" color="#fff"><a-sphere position="0 0 0.35" radius="0.12" color="#ff0000"></a-sphere></a-sphere>
        </a-entity>

        <a-entity id="rig" position="0 0 0">
            <a-camera id="head" position="0 1.6 0">
                <a-cursor id="mouse-fallback" color="#fff" visible="false"></a-cursor>
            </a-camera>
            
            <a-entity id="left-hand" laser-controls="hand: left" raycaster="objects: .cube, .wall; far: 1.6; interval: 30">
                <a-cylinder color="#444" radius="0.025" height="0.25" position="0 0 0" rotation="90 0 0" material="metalness: 1; roughness: 0.2"></a-cylinder>
                <a-cylinder id="saber-blade-left" color="#ff0000" radius="0.018" height="1.2" position="0 0 -0.75" rotation="90 0 0" material="emissive: #ff0000; emissiveIntensity: 5"></a-cylinder>
            </a-entity>
            
            <a-entity id="right-hand" laser-controls="hand: right" raycaster="objects: .menu-btn, .cube, .wall; far: 7; interval: 30">
                <a-cylinder color="#444" radius="0.025" height="0.25" position="0 0 0" rotation="90 0 0" material="metalness: 1; roughness: 0.2"></a-cylinder>
                <a-cylinder id="saber-blade-right" color="#0088ff" radius="0.018" height="1.2" position="0 0 -0.75" rotation="90 0 0" material="emissive: #0088ff; emissiveIntensity: 5"></a-cylinder>
                <a-line start="0 0 0" end="0 0 -7" color="#0088ff" opacity="0.7"></a-line>
            </a-entity>

            <a-entity id="spark-container"></a-entity>
        </a-entity>

        <a-entity id="gameplay-container"></a-entity>

        <a-entity id="game-ui" position="0 3.5 -3.5" visible="false">
            <a-text id="score-text" value="SCORE: 0" align="center" color="#fff" width="6"></a-text>
        </a-entity>

        <a-entity id="main-menu" position="0 1.6 -2">
            <a-entity id="panel-levels" visible="true">
                <a-plane color="#0a0a0a" width="2.8" height="2.2" opacity="0.95"></a-plane>
                <a-text value="SELECT SONG" align="center" position="0 0.8 0.03" width="6" color="#00ffff"></a-text>
                
                <a-entity class="menu-btn" data-sel-level="1" geometry="primitive: plane; width: 2.4; height: 0.2" material="color: #222" position="0 0.4 0.03" text="value: 1. Tutorial Chill; align: center; width: 3.5"></a-entity>
                <a-entity class="menu-btn" data-sel-level="2" geometry="primitive: plane; width: 2.4; height: 0.2" material="color: #222" position="0 0.15 0.03" text="value: 2. Cyber Beats; align: center; width: 3.5"></a-entity>
                <a-entity class="menu-btn" data-sel-level="3" geometry="primitive: plane; width: 2.4; height: 0.2" material="color: #222" position="0 -0.1 0.03" text="value: 3. Neon Rush; align: center; width: 3.5"></a-entity>
                <a-entity class="menu-btn" data-sel-level="4" geometry="primitive: plane; width: 2.4; height: 0.2" material="color: #443300" position="0 -0.35 0.03" text="value: 4. DREAMCORE BACKROOMS; align: center; width: 3.5; color: #ffcc00"></a-entity>
                <a-entity class="menu-btn" data-sel-level="5" geometry="primitive: plane; width: 2.4; height: 0.2" material="color: #550022" position="0 -0.60 0.03" text="value: 5. SHIVER X (Extreme); align: center; width: 3.5; color: #ff0055"></a-entity>
            </a-entity>

            <a-entity id="panel-difficulty" position="0 0 0" visible="false">
                <a-plane color="#050505" width="2.8" height="2.2" opacity="0.95"></a-plane>
                <a-text id="diff-title" value="CHOOSE DIFFICULTY" align="center" position="0 0.8 0.03" width="5.5" color="#ff0055"></a-text>
                
                <a-entity class="menu-btn" data-diff="0" geometry="primitive: plane; width: 1.1; height: 0.22" material="color: #222" position="-0.65 0.4 0.03" text="value: FACIL; align: center"></a-entity>
                <a-entity class="menu-btn" data-diff="1" geometry="primitive: plane; width: 1.1; height: 0.22" material="color: #222" position="0.65 0.4 0.03" text="value: MEDIO; align: center"></a-entity>
                <a-entity class="menu-btn" data-diff="2" geometry="primitive: plane; width: 1.1; height: 0.22" material="color: #222" position="-0.65 0.1 0.03" text="value: DIFICIL; align: center"></a-entity>
                <a-entity class="menu-btn" data-diff="3" geometry="primitive: plane; width: 1.1; height: 0.22" material="color: #222" position="0.65 0.1 0.03" text="value: HARDER; align: center"></a-entity>
                <a-entity class="menu-btn" data-diff="4" geometry="primitive: plane; width: 2.4; height: 0.22" material="color: #3b2300" position="0 -0.2 0.03" text="value: EASY DEMON; align: center; color: #ffaa00"></a-entity>
                <a-entity class="menu-btn" data-diff="5" geometry="primitive: plane; width: 2.4; height: 0.22" material="color: #520000" position="0 -0.48 0.03" text="value: HARD HARD DEMON; align: center; color: #ff3333"></a-entity>
                <a-entity class="menu-btn" data-diff="6" geometry="primitive: plane; width: 2.4; height: 0.22" material="color: #800020" position="0 -0.76 0.03" text="value: EXTREME DEMON; align: center; color: #ff0055"></a-entity>

                <a-entity id="btn-back" class="menu-btn" geometry="primitive: plane; width: 0.6; height: 0.15" material="color: #444" position="0 1.05 0.03" text="value: BACK; align: center; width: 3"></a-entity>
            </a-entity>
        </a-entity>

    </a-scene>

    <script>
        const dificultades = ["FACIL", "MEDIO", "DIFICIL", "HARDER", "EASY DEMON", "HARD DEMON", "EXTREME DEMON"];
        const diffMultipliers = [0.6, 1.0, 1.4, 1.8, 2.3, 2.9, 4.0];

        let selectedLevelId = 1;
        let selectedDiffIdx = 1;
        let score = 0;
        let gameActive = false;
        let lastSpawnTime = 0;
        let currentAudio = null;
        let activeCubes = [];
        let activeWalls = [];
        let liveSparks = [];
        let currentLevelConfig = {};

        const levelsData = {
            1: { audio: 'music-easy', baseSpeed: 6, baseSpawnRate: 1600, env: 'night', color: '#00ffff' },
            2: { audio: 'music-normal', baseSpeed: 9, baseSpawnRate: 1300, env: 'goaland', color: '#00ff88' },
            3: { audio: 'music-hard', baseSpeed: 13, baseSpawnRate: 1000, env: 'tron', color: '#ff00ff' },
            4: { audio: 'music-backrooms', baseSpeed: 16, baseSpawnRate: 720, env: 'dream', color: '#ffcc00' }, 
            5: { audio: 'music-shiver', baseSpeed: 25, baseSpawnRate: 380, env: 'poison', color: '#ff0055' } 
        };

        // MENU CONTROLS
        document.querySelectorAll('[data-sel-level]').forEach(btn => {
            btn.addEventListener('click', function() {
                selectedLevelId = this.getAttribute('data-sel-level');
                document.getElementById('panel-levels').setAttribute('visible', 'false');
                document.getElementById('panel-difficulty').setAttribute('visible', 'true');
                document.getElementById('diff-title').setAttribute('text', `value: LEVEL ${selectedLevelId} - SELECT DIFF; align: center; width: 5.5`);
            });
        });

        document.getElementById('btn-back').addEventListener('click', function() {
            document.getElementById('panel-levels').setAttribute('visible', 'true');
            document.getElementById('panel-difficulty').setAttribute('visible', 'false');
        });

        document.querySelectorAll('[data-diff]').forEach(btn => {
            btn.addEventListener('click', function() {
                selectedDiffIdx = parseInt(this.getAttribute('data-diff'));
                startLevel();
            });
        });

        function startLevel() {
            currentLevelConfig = levelsData[selectedLevelId];
            
            const menu = document.getElementById('main-menu');
            menu.setAttribute('visible', 'false');
            menu.setAttribute('position', '0 -100 0');

            document.getElementById('game-ui').setAttribute('visible', 'true');
            document.getElementById('ambient-env').setAttribute('environment', `preset: ${currentLevelConfig.env}; lighting: none`);
            document.getElementById('neon-glow').setAttribute('light', `color: ${currentLevelConfig.color}; intensity: 2`);

            // Activar decoración especial de Dreamcore si es el nivel 4
            if(selectedLevelId == 4) {
                document.getElementById('dreamcore-decor').setAttribute('visible', 'true');
            } else {
                document.getElementById('dreamcore-decor').setAttribute('visible', 'false');
            }

            currentAudio = document.getElementById(currentLevelConfig.audio);
            currentAudio.currentTime = 0;
            currentAudio.play();

            const mult = diffMultipliers[selectedDiffIdx];
            currentLevelConfig.finalSpeed = currentLevelConfig.baseSpeed * mult;
            currentLevelConfig.finalSpawnRate = currentLevelConfig.baseSpawnRate / (mult * 0.85);

            score = 0;
            updateScore();
            activeCubes = [];
            activeWalls = [];
            gameActive = true;
            lastSpawnTime = performance.now();
        }

        function spawnCube() {
            const container = document.getElementById('gameplay-container');
            
            if (Math.random() > 0.85) {
                spawnWall();
                return;
            }

            const cube = document.createElement('a-entity');
            const posX = (Math.random() * 1.6) - 0.8; 
            const posY = (Math.random() * 1.1) + 0.7; 
            const posZ = -35;

            const isRed = Math.random() > 0.5;
            const cubeColor = isRed ? '#ff0000' : '#0088ff';

            cube.setAttribute('class', 'cube');
            cube.setAttribute('geometry', 'primitive: box; width: 0.36; height: 0.36; depth: 0.36');
            cube.setAttribute('material', `color: ${cubeColor}; emissive: ${cubeColor}; emissiveIntensity: 2; roughness: 0.2`);
            cube.setAttribute('position', `${posX} ${posY} ${posZ}`);

            // Flecha apuntando al frente
            const arrow = document.createElement('a-cone');
            arrow.setAttribute('geometry', 'radiusBottom: 0.08; radiusTop: 0; height: 0.18');
            arrow.setAttribute('material', 'color: #ffffff; emissive: #ffffff; emissiveIntensity: 3');
            
            const directions = [0, 90, 180, 270];
            const randomRot = directions[Math.floor(Math.random() * directions.length)];
            arrow.setAttribute('rotation', `90 0 ${randomRot}`);
            arrow.setAttribute('position', '0 0 0.19'); 

            cube.appendChild(arrow);
            container.appendChild(cube);

            cube.userData = { isRed: isRed };
            activeCubes.push(cube);
        }

        function spawnWall() {
            const container = document.getElementById('gameplay-container');
            const wall = document.createElement('a-box');
            const isLeft = Math.random() > 0.5;
            const posX = isLeft ? -0.9 : 0.9;

            wall.setAttribute('class', 'wall');
            wall.setAttribute('position', `${posX} 2 -35`);
            wall.setAttribute('scale', '1.2 3.5 0.5'); 
            wall.setAttribute('material', 'color: #ff0022; opacity: 0.6; transparent: true; emissive: #ff0022; emissiveIntensity: 1.5');

            container.appendChild(wall);
            activeWalls.push(wall);
        }

        function createNativeSpark(pos) {
            const container = document.getElementById('spark-container');
            const spark = document.createElement('a-sphere');
            
            spark.setAttribute('radius', '0.015');
            spark.setAttribute('material', 'color: #bc00ff; emissive: #ff00ff; emissiveIntensity: 3');
            spark.setAttribute('position', `${pos.x} ${pos.y} ${pos.z}`);
            
            spark.userData = {
                vx: (Math.random() - 0.5) * 3,
                vy: (Math.random() * 2) + 1,
                vz: (Math.random() - 0.5) * 3,
                age: 0
            };
            
            container.appendChild(spark);
            liveSparks.push(spark);
        }

        let lastFrameTime = performance.now();

        function gameLoop() {
            const now = performance.now();
            const deltaTime = (now - lastFrameTime) / 1000;
            lastFrameTime = now;

            // ANIMACIÓN DE LAS CHISPAS ACTIVAS
            for (let s = liveSparks.length - 1; s >= 0; s--) {
                const spark = liveSparks[s];
                let sPos = spark.getAttribute('position');
                let uData = spark.userData;
                
                uData.age += deltaTime;
                if (uData.age > 0.35) {
                    spark.parentNode.removeChild(spark);
                    liveSparks.splice(s, 1);
                    continue;
                }
                
                sPos.x += uData.vx * deltaTime;
                sPos.y += uData.vy * deltaTime;
                sPos.z += uData.vz * deltaTime;
                uData.vy -= 9.8 * deltaTime; 
                spark.setAttribute('position', sPos);
            }

            // CONTROL FIX DE CRASH DE CHISPAS: Solo verificar colisión si el visor/mandos están activos en espacio real
            const leftEl = document.getElementById('saber-blade-left');
            const rightEl = document.getElementById('saber-blade-right');
            
            if (leftEl && rightEl && leftEl.object3D && rightEl.object3D) {
                const leftPos = leftEl.object3D.getWorldPosition(new THREE.Vector3());
                const rightPos = rightEl.object3D.getWorldPosition(new THREE.Vector3());
                
                // Evitar gatillar chispas infinitas si están parados en la posición por defecto de inicio de página (0,0,0)
                if (leftPos.length() > 0.1 && rightPos.length() > 0.1) {
                    const dist = leftPos.distanceTo(rightPos);
                    if (dist < 0.25) {
                        const midPoint = {
                            x: (leftPos.x + rightPos.x) / 2,
                            y: (leftPos.y + rightPos.y) / 2,
                            z: (leftPos.z + rightPos.z) / 2
                        };
                        for(let k=0; k<2; k++) createNativeSpark(midPoint);
                    }
                }
            }

            if (!gameActive) {
                requestAnimationFrame(gameLoop);
                return;
            }

            if (now - lastSpawnTime > currentLevelConfig.finalSpawnRate) {
                spawnCube();
                lastSpawnTime = now;
            }

            const leftRaycaster = document.getElementById('left-hand').components.raycaster;
            const rightRaycaster = document.getElementById('right-hand').components.raycaster;
            const headPos = document.getElementById('head').getAttribute('position');

            // Renderizado de bloques
            for (let i = activeCubes.length - 1; i >= 0; i--) {
                const cube = activeCubes[i];
                if (!cube || !cube.parentNode) continue;

                let pos = cube.getAttribute('position');
                pos.z += currentLevelConfig.finalSpeed * deltaTime;
                cube.setAttribute('position', pos);

                let hitLeft = leftRaycaster && leftRaycaster.intersectedEls.includes(cube);
                let hitRight = rightRaycaster && rightRaycaster.intersectedEls.includes(cube);

                if (hitLeft || hitRight) {
                    if ((hitLeft && cube.userData.isRed) || (hitRight && !cube.userData.isRed)) {
                        score += 100;
                    } else {
                        score += 20;
                    }
                    updateScore();
                    cube.parentNode.removeChild(cube);
                    activeCubes.splice(i, 1);
                    continue;
                }

                if (pos.z > 2) {
                    cube.parentNode.removeChild(cube);
                    activeCubes.splice(i, 1);
                }
            }

            // Renderizado de paredes
            for (let j = activeWalls.length - 1; j >= 0; j--) {
                const wall = activeWalls[j];
                if (!wall || !wall.parentNode) continue;

                let pos = wall.getAttribute('position');
                pos.z += currentLevelConfig.finalSpeed * deltaTime;
                wall.setAttribute('position', pos);

                if (Math.abs(pos.z - headPos.z) < 0.4 && Math.abs(pos.x - headPos.x) < 0.7) {
                    score = Math.max(0, score - 3);
                    updateScore();
                }

                if (pos.z > 3) {
                    wall.parentNode.removeChild(wall);
                    activeWalls.splice(j, 1);
                }
            }

            if (currentAudio && currentAudio.ended) {
                stopGame();
            }

            requestAnimationFrame(gameLoop);
        }

        function updateScore() {
            document.getElementById('score-text').setAttribute('value', `SCORE: ${score}`);
        }

        function stopGame() {
            gameActive = false;
            if (currentAudio) currentAudio.pause();

            document.getElementById('gameplay-container').innerHTML = '';
            activeCubes = [];
            activeWalls = [];
            document.getElementById('dreamcore-decor').setAttribute('visible', 'false');

            const menu = document.getElementById('main-menu');
            menu.setAttribute('visible', 'true');
            menu.setAttribute('position', '0 1.6 -2');
            document.getElementById('panel-levels').setAttribute('visible', 'true');
            document.getElementById('panel-difficulty').setAttribute('visible', 'false');
            
            document.getElementById('game-ui').setAttribute('visible', 'false');
        }

        requestAnimationFrame(gameLoop);
    </script>
</body>
</html>
