<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>VR Rhythm Shiver - Boss Fight</title>
    <script src="https://aframe.io/releases/1.4.2/aframe.min.js"></script>
    <script src="https://unpkg.com/aframe-environment-component@1.3.2/dist/aframe-environment-component.min.js"></script>
</head>
<body>

    <a-scene>
        <a-assets>
            <audio id="shiver-music" src="https://actions.google.com/sounds/v1/science_fiction/retro_game_loop.mp3" preload="auto"></audio>
        </a-assets>

        <a-entity environment="preset: snowy; skyType: gradient; skyColor: #0b111e; horizonColor: #1b263b; dressing: trees; dressingColor: #2c3e50; dressingAmount: 30; groundColor: #e6effa; grid: none"></a-entity>

        <a-sphere position="0 25 -80" radius="18" color="#ffffff" material="fog: false; emissive: #ffffff; emissiveIntensity: 0.3"></a-sphere>

        <a-entity id="rig" position="0 0 0">
            <a-entity camera position="0 1.6 0" look-controls></a-entity>
            
            <a-entity id="leftHand" oculus-touch-controls="hand: left" laser-controls="hand: left" raycaster="objects: .cube; far: 1.5">
                <a-box position="0 0 -0.4" scale="0.03 0.03 0.8" color="#ff1744" material="emissive: #ff1744; emissiveIntensity: 2"></a-box>
            </a-entity>

            <a-entity id="rightHand" oculus-touch-controls="hand: right" laser-controls="hand: right" raycaster="objects: .cube; far: 1.5">
                <a-box position="0 0 -0.4" scale="0.03 0.03 0.8" color="#00e5ff" material="emissive: #00e5ff; emissiveIntensity: 2"></a-box>
            </a-entity>
        </a-entity>

        <a-entity id="boss" position="0 4 -25">
            <a-cone radius-bottom="3" radius-top="0" height="6" color="#0d1b2a" material="wireframe: false"></a-cone>
            <a-cyanhedron position="0 1 2" scale="0.5 0.5 0.5" color="#00e5ff" animation="property: rotation; to: 0 360 0; loop: true; dur: 2000"></a-cyanhedron>
            <a-box position="-4 0 0" rotation="0 0 30" scale="4 0.5 0.2" color="#1b263b"></a-box>
            <a-box position="4 0 0" rotation="0 0 -30" scale="4 0.5 0.2" color="#1b263b"></a-box>
        </a-entity>

        <a-entity id="note-container"></a-entity>

        <a-entity id="menu" position="0 1.6 -2" rotation="0 0 0">
            <a-plane width="2" height="1" color="#111" opacity="0.8">
                <a-text value="SHIVER: BOSS FIGHT\nOprime Trigger para empezar" align="center" color="#fff" position="0 0 0.1" scale="0.5 0.5 0.5"></a-text>
            </a-plane>
        </a-entity>
    </a-scene>

    <script src="game.js"></script>
</body>
</html>
