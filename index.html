<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Beat Saber VR - Ultra Graphics & Fixed Engine</title>
    <script src="https://aframe.io/releases/1.4.2/aframe.min.js"></script>
    <script src="https://unpkg.com/aframe-environment-component@1.3.2/dist/aframe-environment-component.min.js"></script>
</head>
<body>

    <a-scene xr-mode-ui="enabled: true" id="scene" fog="type: exponential; color: #080312; density: 0.045">
        
        <a-assets>
            <audio id="music-1" src="https://actions.google.com/sounds/v1/science_fiction/ambient_space_machine.ogg" preload="auto"></audio>
            <audio id="music-2" src="https://actions.google.com/sounds/v1/science_fiction/hyperspace.ogg" preload="auto"></audio>
            <audio id="music-backrooms" src="https://actions.google.com/sounds/v1/science_fiction/sub_transonic.ogg" preload="auto"></audio>
        </a-assets>

        <a-entity id="ambient-env" environment="preset: poison; lighting: none; ground: flat; grid: none"></a-entity>
        <a-entity light="type: ambient; color: #120b24; intensity: 0.8"></a-entity>
        <a-entity id="bloom-light" light="type: directional; color: #00ffff; intensity: 2" position="0 6 -4"></a-entity>
        <a-entity id="neon-glow" light="type: point; color: #ff0055; intensity: 3; distance: 15" position="0 3 -5"></a-entity>

        <a-entity id="stage-visuals">
            <a-torus color="#ff0055" radius="6" tube="0.05" position="0 2 -10" material="emissive: #ff0055; emissiveIntensity: 6; roughness: 0.1" rotation="0 0 45"></a-torus>
            <a-torus color="#00ffff" radius="6" tube="0.05" position="0 2 -20" material="emissive: #00ffff; emissiveIntensity: 6; roughness: 0.1" rotation="0 0 -45"></a-torus>
            <a-torus color="#bc00ff" radius="6" tube="0.05" position="0 2 -30" material="emissive: #bc00ff; emissiveIntensity: 6; roughness: 0.1"></a-torus>
            
            <a-cylinder position="-3.5 3 -15" scale="0.05 8 0.05" color="#00ffff" material="emissive: #00ffff; emissiveIntensity: 8"></a-cylinder>
            <a-cylinder position="3.5 3 -15" scale="0.05 8 0.05" color="#ff0055" material="emissive: #ff0055; emissiveIntensity: 8"></a-cylinder>
            
            <a-plane position="0 0 -15" rotation="-90 0 0" width="10" height="40" color="#05020a" material="roughness: 0.2; metalness: 0.9"></a-plane>
        </a-entity>

        <a-entity id="rig" position="0 0 0">
            <a-camera id="head" position="0 1.6 0" look-controls="enabled: true"></a-camera>
            
            <a-entity id="left-hand" laser-controls="hand: left" raycaster="objects: .cube; far: 1.8; interval: 20">
                <a-cylinder color="#ff0044" radius="0.015" height="1.1" position="0 0 -0.55" rotation="90 0 0" material="emissive: #ff0044; emissiveIntensity: 8; metalness: 0.5"></a-cylinder>
            </a-entity>
            
            <a-entity id="right-hand" laser-controls="hand: right" raycaster="objects: .menu-btn, .cube; far: 8; interval: 20">
                <a-cylinder color="#00ccff" radius="0.015" height="1.1" position="0 0 -0.55" rotation="90 0 0" material="emissive: #00ccff; emissiveIntensity: 8; metalness: 0.5"></a-cylinder>
                <a-line start="0 0 0" end="0 0 -6" color="#00ccff" opacity="0.5"></a-line>
            </a-entity>
        </a-entity>

        <a-entity id="gameplay-container"></a-entity>

        <a-entity id="game-ui" position="0 3.2 -3" visible="false">
            <a-text id="score-text" value="SCORE: 0" align="center" color="#fff" width="5" font="kelsonsans"></a-text>
        </a-entity>

        <a-entity id="main-menu" position="0 1.6 -2">
            <a-plane color="#030107" width="2.4" height="1.6" opacity="0.95" material="roughness: 0.5; metalness: 0.8"></a-plane>
            <a-text value="CYBER RHYTHM VR" align="center" position="0 0.5 0.02" width="5" color="#bc00ff" font="kelsonsans"></a-text>
            
            <a-entity class="menu-btn" data-level="1" geometry="primitive: plane; width: 1.8; height: 0.22" material="color: #110822; emissive: #bc00ff; emissiveIntensity: 0.5" position="0 0.1 0.03" text="value: START TRACK 01; align: center; width: 3.5"></a-entity>
            <a-entity class="menu-btn" data-level="2" geometry="primitive: plane; width: 1.8; height: 0.22" material="color: #110822; emissive: #bc00ff; emissiveIntensity: 0.5" position="0 -0.2 0.03" text="value: START TRACK 02; align: center; width: 3.5"></a-entity>
            <a-entity class="menu-btn" data-level="3" geometry="primitive: plane; width: 1.8; height: 0.22" material="color: #2b0411; emissive: #ff0055; emissiveIntensity: 0.8" position="0 -0.5 0.03" text="value: THE BACKROOMS LEVEL; align: center; width: 3.5; color: #ff0055"></a-entity>
        </a-entity>

    </a-scene>

    <script>
        let gameActive = false;
        let score = 0;
        let lastSpawnTime = 0;
        let activeCubes = [];
        let currentAudio = null;
        let speed = 12; 
        let spawnRate = 850; 
        let synthInterval = null;

        // MAPA CONFIG NIVELES
        const tracks = {
            1: { audioId: 'music-1', speed: 11, spawnRate: 900, color: '#00ffff' },
            2: { audioId: 'music-2', speed: 14, spawnRate: 750, color: '#ff0055' },
            3: { audioId: 'music-backrooms', speed: 17, spawnRate: 600, color: '#bc00ff' }
        };

        // EVENT LISTENERS DEL MENÚ DE SELECCIÓN
        document.querySelectorAll('[data-level]').forEach(btn => {
            btn.addEventListener('click', function() {
                const lvl = this.getAttribute('data-level');
                startGame(tracks[lvl]);
            });
        });

        // MECANISMO DEFENSIVO: SINTETIZADOR DE AUDIO POR SI EL CDN ESTÁ EMITIENDO ERRORES CORRUPTOS
        function startFallbackSynth() {
            try {
                const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
                synthInterval = setInterval(() => {
                    if(!gameActive) return;
                    let osc = audioCtx.createOscillator();
                    let gain = audioCtx.createGain();
                    osc.type = 'sawtooth';
                    // Notas graves estilo cyberpunk/synthwave
                    const frequencies = [55, 65.41, 73.42, 82.41]; 
                    osc.frequency.value = frequencies[Math.floor(Math.random() * frequencies.length)];
                    
                    gain.gain.setValueAtTime(0.15, audioCtx.currentTime);
                    gain.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + 0.4);
                    
                    osc.connect(gain);
                    gain.connect(audioCtx.destination);
                    osc.start();
                    osc.stop(audioCtx.currentTime + 0.4);
                }, 220);
            } catch(e) {
                console.log("AudioContext no soportado de inmediato.");
            }
        }

        function startGame(config) {
            // Esconder menú de manera radical
            const menu = document.getElementById('main-menu');
            menu.setAttribute('visible', 'false');
            menu.setAttribute('position', '0 -50 0');

            // Mostrar interfaz
            document.getElementById('game-ui').setAttribute('visible', 'true');
            
            // Forzar reproducción de música
            currentAudio = document.getElementById(config.audioId);
            if (currentAudio) {
                currentAudio.currentTime = 0;
                currentAudio.play().catch(err => {
                    console.log("Iniciando audio sintético alternativo integrado de inmediato.");
                });
            }
            startFallbackSynth();

            // Configurar gameplay
            speed = config.speed;
            spawnRate = config.spawnRate;
            score = 0;
            updateScore();
            
            activeCubes = [];
            document.getElementById('gameplay-container').innerHTML = '';
            
            gameActive = true;
            lastSpawnTime = performance.now();
        }

        // GENERACIÓN REESTRUCTURADA SIN DEPENDENCIAS EXTRAÑAS
        function spawnCube() {
            const container = document.getElementById('gameplay-container');
            const cube = document.createElement('a-entity');
            
            // Coordenadas calibradas para la vista del visor VR (Matriz 3x3 al frente)
            const posX = (Math.random() * 1.4) - 0.7; 
            const posY = (Math.random() * 0.9) + 0.9; 
            const posZ = -30;

            const isRed = Math.random() > 0.5;
            const cubeColor = isRed ? '#ff0055' : '#00ffff';

            cube.setAttribute('class', 'cube');
            cube.setAttribute('geometry', 'primitive: box; width: 0.38; height: 0.38; depth: 0.38');
            // Materiales ultra estilizados estilo Blender Cycles (Metalizado alto y emisivo brillante)
            cube.setAttribute('material', `color: ${cubeColor}; emissive: ${cubeColor}; emissiveIntensity: 4; metalness: 0.6; roughness: 0.1`);
            cube.setAttribute('position', `${posX} ${posY} ${posZ}`);

            // Indicador direccional de corte minimalista (Cubo interior blanco brillante)
            const indicator = document.createElement('a-box');
            indicator.setAttribute('geometry', 'width: 0.15; height: 0.15; depth: 0.15');
            indicator.setAttribute('material', 'color: #ffffff; emissive: #ffffff; emissiveIntensity: 3');
            indicator.setAttribute('position', '0 0 0.19');
            cube.appendChild(indicator);

            container.appendChild(cube);
            activeCubes.push(cube);
        }

        // CONTROLADOR DE ANIMACIÓN Y RENDERIZADO DEL GAME LOOP (DELTA TIME ESTABLE)
        let lastFrameTime = performance.now();

        function gameLoop() {
            const now = performance.now();
            const deltaTime = (now - lastFrameTime) / 1000;
            lastFrameTime = now;

            if (!gameActive) {
                requestAnimationFrame(gameLoop);
                return;
            }

            // Generador basado en tiempo delta puro
            if (now - lastSpawnTime > spawnRate) {
                spawnCube();
                lastSpawnTime = now;
            }

            // Raycaster Checks para colisiones exactas con los sables
            const leftRay = document.getElementById('left-hand').components.raycaster;
            const rightRay = document.getElementById('right-hand').components.raycaster;

            for (let i = activeCubes.length - 1; i >= 0; i--) {
                const cube = activeCubes[i];
                if (!cube || !cube.parentNode) continue;

                let pos = cube.getAttribute('position');
                pos.z += speed * deltaTime; // Movimiento fluido hacia adelante
                cube.setAttribute('position', pos);

                // Detección directa por intersección física tridimensional de los raycasters
                let hitLeft = leftRay && leftRay.intersectedEls.includes(cube);
                let hitRight = rightRay && rightRay.intersectedEls.includes(cube);

                if (hitLeft || hitRight) {
                    score += 100;
                    updateScore();
                    cube.parentNode.removeChild(cube);
                    activeCubes.splice(i, 1);
                    continue;
                }

                // Autolimpiar si rebasa al jugador para no saturar memoria ram en VR
                if (pos.z > 2) {
                    cube.parentNode.removeChild(cube);
                    activeCubes.splice(i, 1);
                }
            }

            requestAnimationFrame(gameLoop);
        }

        function updateScore() {
            document.getElementById('score-text').setAttribute('value', `SCORE: ${score}`);
        }

        requestAnimationFrame(gameLoop);
    </script>
</body>
</html>
